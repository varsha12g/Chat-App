spring.application.name=realtime-chat
spring.config.import=optional:file:.env[.properties]
server.port=${PORT:8080}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/realtime_chat}

app.jwt.secret=${JWT_SECRET:change-me-in-production-change-me-in-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging.level.org.springframework.web.socket=INFO
